name: Daily Post Scheduler

on:
  schedule:
    - cron: '0 10 * * *' # Runs at 10:00 AM UTC daily
  workflow_dispatch: # Allows you to manually click a "Run" button in GitHub to test it

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API Webhook
        run: |
          curl -X GET "https://s-media-posting.vercel.app/api/cron/publish" \
          -H "Authorization: Bearer ${{ secrets.API_CRON_KEY }}"
